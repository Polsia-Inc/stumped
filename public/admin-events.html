<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Events Analytics - Stumped Admin</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
      padding: 20px;
    }
    .container { max-width: 1400px; margin: 0 auto; }
    h1 {
      font-size: 32px;
      margin-bottom: 10px;
      color: #fff;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .subtitle { color: #888; margin-bottom: 30px; }
    .back-link {
      display: inline-block;
      color: #667eea;
      text-decoration: none;
      margin-bottom: 20px;
      font-size: 14px;
    }
    .back-link:hover { text-decoration: underline; }

    .time-filters {
      display: flex;
      gap: 10px;
      margin-bottom: 30px;
    }
    .time-filter {
      padding: 8px 16px;
      background: #1a1a1a;
      border: 1px solid #333;
      color: #e0e0e0;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .time-filter:hover { background: #2a2a2a; border-color: #667eea; }
    .time-filter.active { background: #667eea; border-color: #667eea; color: #fff; }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }
    .stat-card {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 12px;
      padding: 20px;
    }
    .stat-card h3 {
      font-size: 14px;
      color: #888;
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .stat-card .value {
      font-size: 36px;
      font-weight: bold;
      color: #fff;
    }

    .section {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 12px;
      padding: 30px;
      margin-bottom: 30px;
    }
    .section h2 {
      font-size: 20px;
      margin-bottom: 20px;
      color: #fff;
    }

    .event-breakdown {
      display: grid;
      gap: 10px;
    }
    .event-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      background: #0a0a0a;
      border-radius: 8px;
      border: 1px solid #222;
    }
    .event-name {
      font-weight: 500;
      color: #e0e0e0;
    }
    .event-count {
      font-weight: bold;
      color: #667eea;
    }

    .recent-events {
      max-height: 500px;
      overflow-y: auto;
    }
    .event-item {
      padding: 12px 16px;
      background: #0a0a0a;
      border-radius: 8px;
      border: 1px solid #222;
      margin-bottom: 8px;
    }
    .event-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }
    .event-type-badge {
      padding: 4px 12px;
      background: #667eea;
      color: #fff;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 600;
    }
    .event-time {
      color: #888;
      font-size: 13px;
    }
    .event-path {
      color: #aaa;
      font-size: 14px;
    }

    .loading {
      text-align: center;
      padding: 60px;
      color: #888;
      font-size: 18px;
    }
    .error {
      background: #2a1515;
      border: 1px solid #661a1a;
      color: #ff6b6b;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 30px;
    }
  </style>
</head>
<body>
  <div class="container">
    <a href="/admin.html" class="back-link">← Back to Admin Dashboard</a>

    <h1>Event Analytics</h1>
    <p class="subtitle">Real-time conversion funnel tracking</p>

    <div class="time-filters">
      <button class="time-filter active" data-time="24h">Last 24 Hours</button>
      <button class="time-filter" data-time="7d">Last 7 Days</button>
      <button class="time-filter" data-time="30d">Last 30 Days</button>
    </div>

    <div id="content">
      <div class="loading">Loading analytics data...</div>
    </div>
  </div>

  <script>
    let currentTimeFilter = '24h';

    // Time filter buttons
    document.querySelectorAll('.time-filter').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.time-filter').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentTimeFilter = btn.dataset.time;
        loadData();
      });
    });

    async function loadData() {
      const contentDiv = document.getElementById('content');
      contentDiv.innerHTML = '<div class="loading">Loading analytics data...</div>';

      try {
        const res = await fetch(`/api/admin/events?time=${currentTimeFilter}`);

        if (!res.ok) {
          if (res.status === 401) {
            window.location.href = '/admin-login.html';
            return;
          }
          throw new Error(`Failed to load data: ${res.status}`);
        }

        const data = await res.json();
        renderDashboard(data);
      } catch (err) {
        contentDiv.innerHTML = `
          <div class="error">
            <strong>Error loading analytics:</strong><br>
            ${err.message}
          </div>
        `;
      }
    }

    function renderDashboard(data) {
      const contentDiv = document.getElementById('content');

      const html = `
        <div class="stats-grid">
          <div class="stat-card">
            <h3>Total Events</h3>
            <div class="value">${data.totalEvents.toLocaleString()}</div>
          </div>
          <div class="stat-card">
            <h3>Unique Visitors</h3>
            <div class="value">${data.uniqueVisitors.toLocaleString()}</div>
          </div>
          <div class="stat-card">
            <h3>Event Types</h3>
            <div class="value">${data.eventBreakdown.length}</div>
          </div>
        </div>

        <div class="section">
          <h2>Event Breakdown</h2>
          <div class="event-breakdown">
            ${data.eventBreakdown.length > 0 ?
              data.eventBreakdown.map(e => `
                <div class="event-row">
                  <span class="event-name">${e.event_type}</span>
                  <span class="event-count">${e.count.toLocaleString()}</span>
                </div>
              `).join('') :
              '<p style="color: #888; text-align: center; padding: 20px;">No events tracked yet</p>'
            }
          </div>
        </div>

        <div class="section">
          <h2>Recent Events (Last 50)</h2>
          <div class="recent-events">
            ${data.recentEvents.length > 0 ?
              data.recentEvents.map(e => `
                <div class="event-item">
                  <div class="event-header">
                    <span class="event-type-badge">${e.event_type}</span>
                    <span class="event-time">${new Date(e.created_at).toLocaleString()}</span>
                  </div>
                  <div class="event-path">${e.page_path || '(no path)'}</div>
                  ${Object.keys(e.metadata || {}).length > 0 ?
                    `<div style="color: #666; font-size: 12px; margin-top: 6px;">
                      ${JSON.stringify(e.metadata)}
                    </div>` : ''
                  }
                </div>
              `).join('') :
              '<p style="color: #888; text-align: center; padding: 20px;">No recent events</p>'
            }
          </div>
        </div>
      `;

      contentDiv.innerHTML = html;
    }

    // Load data on page load
    loadData();

    // Auto-refresh every 30 seconds
    setInterval(loadData, 30000);
  </script>
</body>
</html>
