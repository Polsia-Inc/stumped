<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login | Stumped</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0a0a0a;
      --surface: #141414;
      --surface-2: #1a1a1a;
      --border: #222;
      --text: #f0f0f0;
      --text-muted: #888;
      --accent: #c8ff00;
      --accent-dim: rgba(200, 255, 0, 0.08);
      --wrong: #ef4444;
      --wrong-dim: rgba(239, 68, 68, 0.1);
    }
    body {
      font-family: 'DM Sans', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .login-container {
      width: 100%;
      max-width: 400px;
    }
    .login-header {
      text-align: center;
      margin-bottom: 32px;
    }
    .logo {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 28px;
      letter-spacing: -0.5px;
      color: var(--text);
      margin-bottom: 8px;
    }
    .logo span { color: var(--accent); }
    .subtitle {
      font-size: 15px;
      color: var(--text-muted);
    }
    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 32px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    .form-label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 8px;
    }
    .form-input {
      width: 100%;
      padding: 14px 16px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 15px;
      font-family: 'DM Sans', sans-serif;
      outline: none;
      transition: border-color 0.2s;
    }
    .form-input:focus {
      border-color: var(--accent);
    }
    .btn-login {
      width: 100%;
      padding: 14px;
      background: var(--accent);
      color: #0a0a0a;
      border: none;
      border-radius: 10px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
      letter-spacing: -0.3px;
    }
    .btn-login:hover {
      opacity: 0.9;
    }
    .btn-login:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .error-msg {
      background: var(--wrong-dim);
      color: var(--wrong);
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 14px;
      margin-bottom: 16px;
      display: none;
    }
    .error-msg.show {
      display: block;
    }
    .back-link {
      text-align: center;
      margin-top: 20px;
    }
    .back-link a {
      font-size: 14px;
      color: var(--text-muted);
      text-decoration: none;
      transition: color 0.2s;
    }
    .back-link a:hover {
      color: var(--text);
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-header">
      <div class="logo">stumped<span>.</span></div>
      <div class="subtitle">Admin Dashboard</div>
    </div>
    <div class="login-card">
      <form id="login-form">
        <div class="error-msg" id="error-msg"></div>
        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input
            type="password"
            id="password"
            class="form-input"
            placeholder="Enter admin password"
            autocomplete="current-password"
            required
          >
        </div>
        <button type="submit" class="btn-login" id="btn-login">
          Log In
        </button>
      </form>
    </div>
    <div class="back-link">
      <a href="/">← Back to Stumped</a>
    </div>
  </div>

  <script>
    const form = document.getElementById('login-form');
    const passwordInput = document.getElementById('password');
    const btnLogin = document.getElementById('btn-login');
    const errorMsg = document.getElementById('error-msg');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const password = passwordInput.value.trim();

      if (!password) {
        showError('Please enter password');
        return;
      }

      btnLogin.disabled = true;
      btnLogin.textContent = 'Logging in...';
      errorMsg.classList.remove('show');

      try {
        const res = await fetch('/api/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password })
        });

        const data = await res.json();

        if (res.ok && data.success) {
          window.location.href = '/admin';
        } else {
          showError(data.error || 'Login failed');
          btnLogin.disabled = false;
          btnLogin.textContent = 'Log In';
        }
      } catch (err) {
        showError('Login failed. Please try again.');
        btnLogin.disabled = false;
        btnLogin.textContent = 'Log In';
      }
    });

    function showError(message) {
      errorMsg.textContent = message;
      errorMsg.classList.add('show');
    }
  </script>
</body>
</html>
