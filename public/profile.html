<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="page-title">Profile | Stumped</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0a0a;
      --surface: #141414;
      --surface-2: #1a1a1a;
      --border: #222;
      --text: #f0f0f0;
      --text-muted: #888;
      --accent: #c8ff00;
      --accent-dim: rgba(200, 255, 0, 0.08);
    }

    body {
      font-family: 'DM Sans', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    .container { max-width: 900px; margin: 0 auto; padding: 0 24px; }

    /* NAV */
    nav { padding: 24px 0; border-bottom: 1px solid var(--border); }
    nav .container {
      max-width: 1100px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .logo {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 22px;
      letter-spacing: -0.5px;
      color: var(--text);
      text-decoration: none;
    }
    .logo span { color: var(--accent); }

    /* PROFILE HEADER */
    .profile-header {
      padding: 48px 0 32px;
      border-bottom: 1px solid var(--border);
    }
    .profile-identity {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 24px;
    }
    .profile-avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: var(--surface);
      border: 2px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 32px;
      font-weight: 700;
      color: var(--accent);
      flex-shrink: 0;
    }
    .profile-info { flex: 1; }
    .profile-name {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 32px;
      font-weight: 700;
      letter-spacing: -1px;
      margin-bottom: 4px;
    }
    .profile-joined {
      font-size: 14px;
      color: var(--text-muted);
    }

    .profile-stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 16px;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
    }
    .stat-value {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 32px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: -1px;
    }
    .stat-label {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    /* CONTENT */
    .profile-content {
      padding: 40px 0 80px;
    }
    .section-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 20px;
      letter-spacing: -0.5px;
    }

    .quizzes-grid {
      display: grid;
      gap: 12px;
    }
    .quiz-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
      transition: border-color 0.2s;
      text-decoration: none;
      color: var(--text);
    }
    .quiz-card:hover { border-color: rgba(200, 255, 0, 0.3); }
    .quiz-info { flex: 1; min-width: 0; }
    .quiz-topic {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 8px;
      letter-spacing: -0.3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .quiz-meta {
      display: flex;
      gap: 16px;
      font-size: 13px;
      color: var(--text-muted);
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }

    .loading {
      text-align: center;
      padding: 80px 20px;
      color: var(--text-muted);
    }

    .not-found {
      text-align: center;
      padding: 100px 20px;
    }
    .not-found h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 12px;
    }
    .not-found p {
      color: var(--text-muted);
      margin-bottom: 24px;
    }
    .btn-home {
      display: inline-block;
      padding: 12px 24px;
      background: var(--accent);
      color: #0a0a0a;
      border-radius: 10px;
      text-decoration: none;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 600;
      letter-spacing: -0.3px;
    }

    /* Mobile */
    @media (max-width: 768px) {
      .container { padding: 0 20px; }
      .profile-header { padding: 32px 0 24px; }
      .profile-name { font-size: 26px; }
      .profile-stats { grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 12px; }
      .stat-card { padding: 14px; }
      .stat-value { font-size: 24px; }
      .profile-content { padding: 32px 0 64px; }
      .section-title { font-size: 20px; }
      .quiz-card { flex-direction: column; align-items: flex-start; }
      .quiz-meta { flex-direction: column; gap: 6px; }
    }

    @media (max-width: 480px) {
      .container { padding: 0 16px; }
      nav { padding: 16px 0; }
      .logo { font-size: 20px; }
      .profile-header { padding: 24px 0 20px; }
      .profile-avatar { width: 64px; height: 64px; font-size: 24px; }
      .profile-name { font-size: 22px; }
      .stat-value { font-size: 20px; }
      .quiz-topic { font-size: 16px; }
    }
  </style>
</head>
<body>
  <nav>
    <div class="container">
      <a href="/" class="logo">stumped<span>.</span></a>
      <div id="nav-auth"></div>
    </div>
  </nav>

  <div id="loading" class="loading">Loading profile...</div>

  <div id="not-found" class="not-found" style="display:none;">
    <div class="container">
      <h1>User not found</h1>
      <p>This profile doesn't exist.</p>
      <a href="/" class="btn-home">Go Home</a>
    </div>
  </div>

  <div id="profile-content" style="display:none;">
    <div class="profile-header">
      <div class="container">
        <div class="profile-identity">
          <div class="profile-avatar" id="profile-avatar"></div>
          <div class="profile-info">
            <h1 class="profile-name" id="profile-name"></h1>
            <p class="profile-joined" id="profile-joined"></p>
          </div>
        </div>
        <div class="profile-stats">
          <div class="stat-card">
            <div class="stat-value" id="stat-created">0</div>
            <div class="stat-label">Quizzes Created</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" id="stat-taken">0</div>
            <div class="stat-label">Quizzes Taken</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" id="stat-avg"><span style="font-size:20px;">—</span></div>
            <div class="stat-label">Average Score</div>
          </div>
        </div>
      </div>
    </div>

    <div class="profile-content">
      <div class="container">
        <h2 class="section-title">Created Quizzes</h2>
        <div id="quizzes-grid" class="quizzes-grid"></div>
        <div id="empty-quizzes" class="empty-state" style="display:none;">
          No quizzes created yet
        </div>
      </div>
    </div>
  </div>

  <script>
  (function() {
    const loading = document.getElementById('loading');
    const notFound = document.getElementById('not-found');
    const profileContent = document.getElementById('profile-content');
    const navAuth = document.getElementById('nav-auth');

    // Get display name from URL path (/u/DisplayName)
    const pathParts = window.location.pathname.split('/');
    const displayName = pathParts[2];

    if (!displayName) {
      showNotFound();
      return;
    }

    async function loadAuthState() {
      try {
        const res = await fetch('/api/auth/me');
        if (res.ok) {
          const data = await res.json();
          navAuth.innerHTML = '<a href="/dashboard" style="font-size:14px;color:var(--text);text-decoration:none;font-weight:500;">' + escHtml(data.user.displayName) + '</a>';
        } else {
          navAuth.innerHTML = '<a href="/login.html" style="font-size:13px;color:var(--text-muted);text-decoration:none;">Log In</a>';
        }
      } catch (err) {
        navAuth.innerHTML = '<a href="/login.html" style="font-size:13px;color:var(--text-muted);text-decoration:none;">Log In</a>';
      }
    }

    async function loadProfile() {
      try {
        const res = await fetch('/api/users/' + encodeURIComponent(displayName));
        if (!res.ok) {
          showNotFound();
          return;
        }

        const data = await res.json();

        document.getElementById('page-title').textContent = data.user.displayName + ' | Stumped';
        document.getElementById('profile-name').textContent = data.user.displayName;
        document.getElementById('profile-joined').textContent = 'Joined ' + formatDate(data.user.joinedAt);
        document.getElementById('profile-avatar').textContent = data.user.displayName.charAt(0).toUpperCase();

        document.getElementById('stat-created').textContent = data.stats.quizzesCreated;
        document.getElementById('stat-taken').textContent = data.stats.quizzesTaken;
        if (data.stats.quizzesTaken > 0) {
          document.getElementById('stat-avg').textContent = data.stats.avgScore + '%';
        }

        const quizzesGrid = document.getElementById('quizzes-grid');
        const emptyQuizzes = document.getElementById('empty-quizzes');

        if (data.quizzes.length === 0) {
          emptyQuizzes.style.display = 'block';
        } else {
          quizzesGrid.innerHTML = data.quizzes.map(quiz => `
            <a href="${quiz.url}" class="quiz-card">
              <div class="quiz-info">
                <div class="quiz-topic">${escHtml(quiz.topic)}</div>
                <div class="quiz-meta">
                  <span>🎯 ${quiz.playCount} ${quiz.playCount === 1 ? 'play' : 'plays'}</span>
                  <span>📅 ${formatDate(quiz.createdAt)}</span>
                </div>
              </div>
            </a>
          `).join('');
        }

        loading.style.display = 'none';
        profileContent.style.display = 'block';
      } catch (err) {
        console.error('Load profile error:', err);
        showNotFound();
      }
    }

    function showNotFound() {
      loading.style.display = 'none';
      notFound.style.display = 'block';
    }

    function formatDate(dateStr) {
      const date = new Date(dateStr);
      return date.toLocaleDateString('en-US', { month: 'short', year: 'numeric' });
    }

    function escHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    loadAuthState();
    loadProfile();
  })();
  </script>
</body>
</html>
